#
# Full development setup: PostgreSQL 18 + Redis + EHRbase application
#
# Usage:
#   mvn install -DskipTests                                   # Build the jar first
#   docker compose -f docker-compose-dev.yml up -d --build    # Build image + start
#   docker compose -f docker-compose-dev.yml logs -f ehrbase  # Watch app logs
#
# Endpoints:
#   http://localhost:8080/ehrbase/api/v2/templates     # Template list
#   http://localhost:8080/ehrbase/api/v2/ehrs          # EHR operations
#   http://localhost:8080/ehrbase/api/v2/graphiql       # GraphiQL IDE
#
# Stop:
#   docker compose -f docker-compose-dev.yml down -v  # Stop + remove volumes
#
services:

  #
  # PostgreSQL 18 with schemas, extensions, and roles pre-configured
  #
  ehrdb:
    image: postgres:18
    container_name: ehrbase-pg18-dev
    environment:
      POSTGRES_DB: ehrbase
      POSTGRES_USER: ehrbase
      POSTGRES_PASSWORD: ehrbase
    volumes:
      - ./jooq-pg/src/main/resources/jooq-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ehrbase-pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ehrbase -d ehrbase" ]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    networks:
      - ehrbase-dev

  #
  # Redis for distributed caching
  #
  redis:
    image: redis:8-alpine
    container_name: ehrbase-redis-dev
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - ehrbase-dev

  #
  # EHRbase application (built from local jar via Dockerfile)
  #
  ehrbase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ehrbase-app-dev
    environment:
      DB_URL: jdbc:postgresql://ehrdb:5432/ehrbase
      DB_USER_ADMIN: ehrbase
      DB_PASS_ADMIN: ehrbase
      DB_USER: ehrbase
      DB_PASS: ehrbase
      SERVER_NODENAME: local.ehrbase.org
      SECURITY_AUTHTYPE: NONE
      SPRING_CACHE_TYPE: CAFFEINE
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_ENDPOINTS_WEB_ACCESS: PUBLIC
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      EHRBASE_FEATURES_ADMIN_API: "true"
      EHRBASE_FEATURES_ITEM_TAGS: "true"
      EHRBASE_FEATURES_EMERGENCY_ACCESS: "false"
      EHRBASE_FEATURES_GDPR: "false"
      EHRBASE_FEATURES_HIPAA: "false"
      EHRBASE_FEATURES_IHE: "false"
    depends_on:
      ehrdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/ehrbase/management/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - ehrbase-dev

volumes:
  ehrbase-pgdata:

networks:
  ehrbase-dev: { }
