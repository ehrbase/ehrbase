#
# Development setup: PostgreSQL 18 only
# Usage: docker compose -f docker-compose-dev.yml up -d
#
services:

  ehrdb:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EHRBASE_USER_ADMIN: ehrbase
      EHRBASE_PASSWORD_ADMIN: ehrbase
      EHRBASE_USER: ehrbase_restricted
      EHRBASE_PASSWORD: ehrbase_restricted
    volumes:
      - ./createdb-docker.sql:/docker-entrypoint-initdb.d/01-createdb.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    networks:
      - ehrbase-dev

networks:
  ehrbase-dev: { }
